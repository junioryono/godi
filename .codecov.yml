coverage:
  range: 80..100
  round: down
  precision: 2
  status:
    project:
      default:
        target: 80%
        threshold: 1%
        if_not_found: failure
        if_ci_failed: error
    patch:
      default:
        target: 80%
        threshold: 1%
        if_not_found: failure

comment:
  layout: reach,diff,flags
  require_changes: true
