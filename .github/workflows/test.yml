name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

permissions:
  contents: read

env:
  GO_VERSION: "1.26.5"
  GOLANGCI_LINT_VERSION: "v2.12.2"
  GOSEC_VERSION: "v2.27.1"
  GOVULNCHECK_VERSION: "v1.6.0"
  ACTIONLINT_VERSION: "v1.7.12"
  COVERAGE_THRESHOLD: "80"

jobs:
  inventory:
    name: Module Inventory
    runs-on: ubuntu-latest
    outputs:
      all: ${{ steps.matrix.outputs.all }}
      coverage: ${{ steps.matrix.outputs.coverage }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Validate module inventory
        run: scripts/check-modules.sh

      - name: Build matrices
        id: matrix
        run: |
          echo "all=$(scripts/module-matrix.sh all)" >> "$GITHUB_OUTPUT"
          echo "coverage=$(scripts/module-matrix.sh coverage)" >> "$GITHUB_OUTPUT"

  platform-test:
    name: Root Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run root tests
        run: go test -race ./...

  module-test:
    name: Module Test (${{ matrix.module }})
    needs: inventory
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.inventory.outputs.all) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: ${{ matrix.module == '.' && 'go.sum' || format('{0}/go.sum', matrix.module) }}

      - name: Verify module
        working-directory: ${{ matrix.module }}
        run: |
          go mod verify
          go mod tidy -diff
          go vet ./...
          go build ./...
          go test -race ./...

  lint:
    name: Lint (${{ matrix.module }})
    needs: inventory
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.inventory.outputs.all) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: ${{ matrix.module == '.' && 'go.sum' || format('{0}/go.sum', matrix.module) }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: ${{ matrix.module }}

  quality:
    name: Repository Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            go.sum
            */go.sum

      - name: Check inventory, formatting, and module metadata
        run: |
          make module-check
          make dependency-check
          make format-check
          make tidy-check

      - name: Validate workflows
        run: make workflow-check

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install documentation dependencies
        run: python -m pip install --requirement docs/requirements.txt

      - name: Build documentation with strict warnings
        run: sphinx-build -W --keep-going -b html docs docs/_build/html

  coverage:
    name: Coverage (${{ matrix.module }})
    needs: inventory
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.inventory.outputs.coverage) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: ${{ matrix.module == '.' && 'go.sum' || format('{0}/go.sum', matrix.module) }}

      - name: Generate and enforce coverage
        id: coverage
        shell: bash
        run: |
          name="${{ matrix.module }}"
          if [[ "$name" == "." ]]; then name=root; fi
          mkdir -p coverage
          profile="$GITHUB_WORKSPACE/coverage/$name.out"
          (cd "${{ matrix.module }}" && go test -covermode=atomic -coverprofile="$profile" ./...)
          total=$(cd "${{ matrix.module }}" && go tool cover -func="$profile" \
            | awk '/^total:/ { gsub(/%/, "", $3); print $3 }')
          awk -v total="$total" -v threshold="$COVERAGE_THRESHOLD" 'BEGIN {
            printf "coverage: %.1f%% (minimum %.1f%%)\n", total, threshold
            if (total + 0 < threshold + 0) exit 1
          }'
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-${{ steps.coverage.outputs.name }}
          path: coverage/${{ steps.coverage.outputs.name }}.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: coverage/${{ steps.coverage.outputs.name }}.out
          flags: ${{ steps.coverage.outputs.name }}
          name: ${{ steps.coverage.outputs.name }}
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  published-compatibility:
    name: Published Module Compatibility
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            go.sum
            */go.sum

      - name: Test integrations without local replacements
        run: scripts/check-published-modules.sh

  benchmark:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            go.sum
            benchmarks/go.sum

      - name: Run package and comparison benchmarks
        env:
          BENCH_COUNT: "3"
        run: scripts/run-benchmarks.sh | tee benchmark-results.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: benchmark-results
          path: benchmark-results.txt

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            go.sum
            */go.sum

      - name: Scan every module
        run: make security

  all-checks:
    name: All checks passed
    if: always()
    runs-on: ubuntu-latest
    needs:
      - inventory
      - platform-test
      - module-test
      - lint
      - quality
      - docs
      - coverage
      - published-compatibility
      - benchmark
      - security
    steps:
      - name: Verify all required jobs passed
        env:
          JOB_RESULTS: ${{ toJSON(needs) }}
        run: |
          echo "$JOB_RESULTS" | jq .
          echo "$JOB_RESULTS" | jq -e 'all(.[]; .result == "success")'
