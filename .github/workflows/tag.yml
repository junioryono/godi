name: Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact release version (for example v5.0.2)
        required: true
        type: string
      confirm_major:
        description: Type MAJOR for a migrated major-version release
        required: false
        type: string

concurrency:
  group: release-tags
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  guard:
    name: Validate Release Ref
    runs-on: ubuntu-latest
    outputs:
      dispatch_sha: ${{ steps.sha.outputs.dispatch_sha }}
    steps:
      - name: Require main
        if: github.ref != 'refs/heads/main'
        run: |
          echo "Releases must be dispatched from main, not $GITHUB_REF" >&2
          exit 1

      - name: Record tested commit
        id: sha
        run: echo "dispatch_sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"

  run-tests:
    name: Run Tests
    needs: guard
    uses: ./.github/workflows/test.yml
    secrets: inherit

  tag:
    name: Create Tags
    needs: [guard, run-tests]
    runs-on: ubuntu-latest
    environment: release
    outputs:
      release_tag: ${{ steps.release.outputs.new_tag }}
      release_commit: ${{ steps.release.outputs.commit }}
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.guard.outputs.dispatch_sha }}
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Create and push the atomic tag set
        id: release
        env:
          CONFIRM_MAJOR: ${{ inputs.confirm_major }}
          RELEASE_REMOTE: origin
        run: scripts/release-tags.sh "${{ inputs.version }}"

      - name: Summary
        run: |
          new_tag="${{ steps.release.outputs.new_tag }}"
          current_tag="${{ steps.release.outputs.current_tag }}"
          {
            echo "## Tag Creation Summary"
            echo
            echo "- **Version bump:** ${{ steps.release.outputs.bump }}"
            echo "- **Previous tag:** $current_tag"
            echo "- **New tag:** $new_tag"
            echo
            echo "| Module | Tag | Go command |"
            echo "| --- | --- | --- |"
            root_module=$(awk '$1 == "module" { print $2; exit }' go.mod)
            echo "| godi | \`$new_tag\` | \`go get $root_module@$new_tag\` |"
            while IFS= read -r module; do
              module_path=$(awk '$1 == "module" { print $2; exit }' "$module/go.mod")
              echo "| $module | \`$module/$new_tag\` | \`go get $module_path@$new_tag\` |"
            done < <(scripts/module-matrix.sh release | tr -d '[]"' | tr ',' '\n')
          } >> "$GITHUB_STEP_SUMMARY"

  github-release:
    name: Create GitHub Release
    needs: tag
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.tag.outputs.release_tag }}
      commit: ${{ needs.tag.outputs.release_commit }}
