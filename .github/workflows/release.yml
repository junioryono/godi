name: Release

# Releases are created by tag.yml (via workflow_call) after it pushes the
# atomic tag set, or manually via workflow_dispatch for recovery. There is
# deliberately no push-tag trigger: it would run this workflow a second time
# for the same tag.
on:
  workflow_call:
    inputs:
      tag:
        description: Strict release tag
        required: true
        type: string
      commit:
        description: Commit shared by the complete release tag set
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Strict release tag to recover or recreate
        required: true
        type: string
      commit:
        description: Exact commit shared by the release tag set
        required: true
        type: string

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    concurrency:
      group: release-${{ inputs.tag }}
      cancel-in-progress: false

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ inputs.commit }}
          fetch-depth: 0

      - name: Validate release tag set
        id: validate
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: scripts/validate-release-set.sh "$RELEASE_TAG"

      - name: Generate Release Notes
        id: changelog
        env:
          MODULE_PATH: ${{ steps.validate.outputs.module_path }}
          RELEASE_TAG: ${{ steps.validate.outputs.tag }}
        run: scripts/generate-release-notes.sh "$RELEASE_TAG" "$MODULE_PATH"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.changelog.outputs.current_tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$tag" --notes-file release_notes.md
          else
            gh release create "$tag" --verify-tag --title "$tag" --notes-file release_notes.md
          fi
