name: Release

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      tag:
        description: Strict release tag
        required: true
        type: string
      commit:
        description: Commit shared by the complete release tag set
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Strict release tag to recover or recreate
        required: true
        type: string
      commit:
        description: Exact commit shared by the release tag set
        required: true
        type: string

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    concurrency:
      group: release-${{ inputs.tag || github.ref_name }}
      cancel-in-progress: false

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.commit || github.sha }}
          fetch-depth: 0

      - name: Validate release tag set
        id: validate
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: scripts/validate-release-set.sh "$RELEASE_TAG"

      - name: Generate Release Notes
        id: changelog
        env:
          MODULE_PATH: ${{ steps.validate.outputs.module_path }}
          RELEASE_TAG: ${{ steps.validate.outputs.tag }}
        run: |
          # Get current and previous tags
          CURRENT_TAG=$RELEASE_TAG
          VERSION=${CURRENT_TAG#v}
          PREVIOUS_TAG=$(git describe --tags --match 'v[0-9]*' --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || echo "")

          echo "current_tag=$CURRENT_TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "previous_tag=$PREVIOUS_TAG" >> $GITHUB_OUTPUT

          # Create release notes for GitHub release
          RELEASE_NOTES="release_notes.md"
          echo "# Release $VERSION" > $RELEASE_NOTES
          echo "" >> $RELEASE_NOTES

          # Collect commits by type
          if [ -n "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log $PREVIOUS_TAG..$CURRENT_TAG --pretty=format:"%s|%h")
          else
            COMMITS=$(git log $CURRENT_TAG --pretty=format:"%s|%h")
          fi

          # Parse breaking changes
          BREAKING=""
          while IFS='|' read -r msg hash; do
            # Check for breaking changes (commits with ! or BREAKING CHANGE)
            if echo "$msg" | grep -qE '^[a-z]+(\([^)]+\))?!:' || echo "$msg" | grep -q 'BREAKING.CHANGE'; then
              # Extract the actual message after the type
              CLEAN_MSG=$(echo "$msg" | sed -E 's/^[a-z]+(\([^)]+\))?!?: ?//')
              BREAKING="${BREAKING}* ${CLEAN_MSG}\n"
            fi
          done <<< "$COMMITS"

          if [ -n "$BREAKING" ]; then
            echo "## ⚠ BREAKING CHANGES" >> $RELEASE_NOTES
            echo "" >> $RELEASE_NOTES
            echo -e "$BREAKING" >> $RELEASE_NOTES
            echo "" >> $RELEASE_NOTES
          fi

          # Parse bug fixes
          FIXES=""
          while IFS='|' read -r msg hash; do
            # Check for fix commits
            if echo "$msg" | grep -qE '^fix(\([^)]+\))?:'; then
              # Extract scope and message
              if echo "$msg" | grep -qE '^fix\([^)]+\):'; then
                SCOPE=$(echo "$msg" | sed -E 's/^fix\(([^)]+)\):.*/\1/')
                CLEAN_MSG=$(echo "$msg" | sed -E 's/^fix\([^)]+\): ?//')
                FIXES="${FIXES}* **${SCOPE}:** ${CLEAN_MSG} ([${hash}](https://github.com/junioryono/godi/commit/${hash}))\n"
              else
                CLEAN_MSG=$(echo "$msg" | sed -E 's/^fix: ?//')
                FIXES="${FIXES}* ${CLEAN_MSG} ([${hash}](https://github.com/junioryono/godi/commit/${hash}))\n"
              fi
            fi
          done <<< "$COMMITS"

          if [ -n "$FIXES" ]; then
            echo "## Bug Fixes" >> $RELEASE_NOTES
            echo "" >> $RELEASE_NOTES
            echo -e "$FIXES" >> $RELEASE_NOTES
            echo "" >> $RELEASE_NOTES
          fi

          # Parse features
          FEATURES=""
          while IFS='|' read -r msg hash; do
            # Check for feature commits
            if echo "$msg" | grep -qE '^feat(\([^)]+\))?:'; then
              # Extract scope and message
              if echo "$msg" | grep -qE '^feat\([^)]+\):'; then
                SCOPE=$(echo "$msg" | sed -E 's/^feat\(([^)]+)\):.*/\1/')
                CLEAN_MSG=$(echo "$msg" | sed -E 's/^feat\([^)]+\): ?//')
                FEATURES="${FEATURES}* **${SCOPE}:** ${CLEAN_MSG} ([${hash}](https://github.com/junioryono/godi/commit/${hash}))\n"
              else
                CLEAN_MSG=$(echo "$msg" | sed -E 's/^feat: ?//')
                FEATURES="${FEATURES}* ${CLEAN_MSG} ([${hash}](https://github.com/junioryono/godi/commit/${hash}))\n"
              fi
            fi
          done <<< "$COMMITS"

          if [ -n "$FEATURES" ]; then
            echo "## Features" >> $RELEASE_NOTES
            echo "" >> $RELEASE_NOTES
            echo -e "$FEATURES" >> $RELEASE_NOTES
            echo "" >> $RELEASE_NOTES
          fi

          # Add installation instructions
          echo "" >> $RELEASE_NOTES
          echo "## Installation" >> $RELEASE_NOTES
          echo "" >> $RELEASE_NOTES
          echo '```bash' >> $RELEASE_NOTES
          echo "go get $MODULE_PATH@$CURRENT_TAG" >> $RELEASE_NOTES
          echo '```' >> $RELEASE_NOTES

          # Add commit list
          echo "" >> $RELEASE_NOTES
          echo "## All Changes" >> $RELEASE_NOTES
          echo "" >> $RELEASE_NOTES
          if [ -n "$PREVIOUS_TAG" ]; then
            git log $PREVIOUS_TAG..$CURRENT_TAG --pretty=format:"* %s" >> $RELEASE_NOTES
          else
            git log $CURRENT_TAG --pretty=format:"* %s" >> $RELEASE_NOTES
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.changelog.outputs.current_tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$tag" --notes-file release_notes.md
          else
            gh release create "$tag" --verify-tag --title "$tag" --notes-file release_notes.md
          fi
